version: '3.8'

services:
  sanhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanhub
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - UNDICI_NO_BODY_TIMEOUT=1

      # Auth
      - NEXTAUTH_URL=${NEXTAUTH_URL:?Set NEXTAUTH_URL in .env}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}

      # Admin account created on first boot
      - ADMIN_EMAIL=${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}

      # MySQL is the default Docker database.
      - DB_TYPE=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-sanhub}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-sanhub}
      - MYSQL_POOL_SIZE=${MYSQL_POOL_SIZE:-50}
      - MYSQL_SSL=false
      - TRUST_PROXY=true

      # File media storage
      - MEDIA_FILE_STORAGE=${MEDIA_FILE_STORAGE:-true}
    volumes:
      - sanhub_data:/app/data

  mysql:
    image: mysql:8.4
    container_name: sanhub-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-sanhub}
      - MYSQL_USER=${MYSQL_USER:-sanhub}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - sanhub_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sanhub_data:
  sanhub_mysql:
